<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --page-bg: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 6px 20px rgba(15, 23, 42, 0.12);
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif;
      overflow: auto;
    }
    .wrap {
      min-height: 100%;
      box-sizing: border-box;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .status {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .pages {
      width: 100%;
      max-width: 980px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .page-frame {
      width: fit-content;
      max-width: 100%;
      background: var(--page-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 8px;
      box-sizing: border-box;
    }
    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="status" class="status">Loading PDF...</div>
    <div id="pages" class="pages"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="/static/js/pdf_viewer.js"></script>
</body>
</html>
