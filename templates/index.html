<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASR Studio | Premium Transcription</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>

<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">GENERATING TRANSCRIPTION...</div>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-resizer" id="resizer"></div>
    <div class="brand-row">
        <button class="collapse-btn" onclick="toggleSidebar()" title="Toggle Sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
    </div>
    <div id="sidebarContent">
        <h1 id="sideHeading" style="display:none;">Speaker Mapping</h1>
        <div id="renameBox"></div>
        <button class="sidebar-btn finalize-btn hidden" id="finalizeBtn" onclick="applyNames()">Finalize Names</button>
        <h1>Export Options</h1>
        <button class="sidebar-btn btn-export hidden" id="exportTranscriptBtn" onclick="exportTranscript()">Export Transcript</button>
        <button class="sidebar-btn btn-export hidden" id="exportSummaryBtn" onclick="exportSummary()">Export Summary</button>
        <button class="sidebar-btn hidden" id="impersonateBtn" onclick="handleImpersonate()">Switch User</button>
        <div class="history-header">
            <h1>History</h1>
            <button class="history-clear-btn" id="clearHistoryBtn" type="button" onclick="clearAllHistory()">Clear History</button>
        </div>
        <div id="historyList" class="history-list">
            <div class="history-empty">No history yet</div>
        </div>
        <div class="history-header">
            <h1>Documents</h1>
            <div>
                <button class="history-clear-btn" id="refreshDocsBtn" type="button" onclick="refreshDocumentHistory()">Refresh</button>
                <button class="history-clear-btn" id="clearDocsBtn" type="button" onclick="clearAllDocuments()">Clear</button>
            </div>
        </div>
        <div id="documentHistoryList" class="history-list docs">
            <div class="history-empty">No documents yet</div>
        </div>
        <div id="docMiniPanel" class="doc-mini-panel hidden">
            <div class="doc-mini-title">Mini Preview</div>
            <div class="doc-mini-actions">
                <button class="doc-mini-btn" type="button" onclick="openDocumentPreview('view')">View</button>
                <button class="doc-mini-btn" type="button" onclick="openDocumentPreview('zoom')">Zoom</button>
            </div>
            <iframe id="docMiniFrame" class="doc-mini-frame" title="Document mini preview"></iframe>
            <div id="docMiniName" class="doc-mini-name"></div>
        </div>
    </div>
</div>

<div class="app-shell">
<div class="main">
    <div class="navbar">
        <h1>🎙️ ASR Studio</h1>
        <div class="nav-controls">
            <select class="nav-select" id="translationTarget" title="Select translation language"></select>
            <button class="nav-btn start-meeting-btn" id="recordBtn" onclick="startRecording()">Start live Meeting</button>
            <button class="nav-btn hidden" id="pauseBtn" onclick="togglePauseRecording()">Pause</button>
            <button class="nav-btn hidden" id="stopBtn" onclick="stopRecording()">Stop</button>
            <button class="nav-btn sum-nav-btn" id="sumBtn" onclick="showSummary()">✨ Summarize</button>
            <button class="nav-btn keyword-nav-btn hidden" id="keywordBtn" onclick="showKeywordSearch()" title="Keyword Spotting">🔎</button>
            <button class="nav-btn new-chat-btn" onclick="location.reload()">New Session</button>
            <button class="nav-btn admin-btn" id="adminBtn" onclick="showAdminPanel()">Admin</button>
            <form method="post" action="/logout" style="margin:0;">
                <button class="nav-btn" type="submit">Logout</button>
            </form>
        </div>
    </div>
    <div id="chat">
      <div class="upload-hero">
        <h2 style="font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;"></h2>
        <p></p>
        <div class="drop-zone-card" id="dropZoneCard" onclick="openFilePicker()">
            <div class="drop-zone-icon">🎙</div>
            <div class="drop-zone-title"></div>
            <div class="drop-zone-subtitle"><button class="browse-inline-btn" type="button" onclick="event.stopPropagation(); openFilePicker();">Browse File</button></div>
            <div class="drop-zone-support">Supports: VIDEO / AUDIO / DOCUMENTS / PDF / PPT .. and Many More</div>
        </div>
      </div>
      <div class="message-row">
        <div class="avatar" style="background: #f59e0b">AI</div>
        <div class="content">Upload a recording or start a meeting to generate transcripts and summaries.</div>
      </div>
    </div>
    <input type="file" id="audioFile" accept=".wav,.mp3,.aac,.aiff,.wma,.amr,.opus,.webm,.ogg,.m4a,.mp4,.mkv,.avi,.mov,.wmv,.mpeg,.3gp,.pdf,.docx,.txt" hidden>
</div>
<div class="gutter" id="pdfGutter" title="Resize PDF panel"></div>
<aside id="pdfPanel" class="pdfPanel" aria-hidden="true">
    <div class="pdf-toolbar">
        <button type="button" class="zoom-btn" onclick="setPdfZoom(-0.1)">Zoom -</button>
        <button type="button" class="zoom-btn" onclick="setPdfZoom(0.1)">Zoom +</button>
        <button type="button" class="reset-btn" onclick="resetPdfZoom()">Reset</button>
        <span class="zoom-indicator" id="pdfZoomIndicator">100%</span>
        <button type="button" class="close-btn" onclick="closeDocumentPreview()">Close</button>
    </div>
    <div class="pdf-viewer-container">
        <iframe id="pdfFrameMain" title="Document preview"></iframe>
    </div>
</aside>
</div>

<script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
