<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASR Venu</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f1116;
        color: #e6e8ee;
        display: grid;
        place-items: center;
        height: 100vh;
      }
      .card {
        max-width: 520px;
        padding: 24px 28px;
        border-radius: 16px;
        background: #1a1f2a;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        text-align: center;
      }
      h1 { margin: 0 0 8px; font-size: 22px; }
      p { margin: 0; opacity: 0.8; line-height: 1.5; }
      code { background: #0c0f15; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>ASR Venu Desktop</h1>
      <p>
        This Tauri shell is configured to load the Flask UI during
        <code>tauri dev</code>. If you see this page, start the Flask server
        or run the Tauri dev command.
      </p>
    </div>
  </body>
</html>
